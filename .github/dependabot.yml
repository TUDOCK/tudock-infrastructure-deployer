version: 2

updates:
  - package-ecosystem: "composer"
    directory: /
    schedule:
      interval: "monthly"
    versioning-strategy: increase-if-necessary

  # Updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 5
    target-branch: "master"
    schedule:
      interval: daily
      timezone: "Europe/Berlin"
